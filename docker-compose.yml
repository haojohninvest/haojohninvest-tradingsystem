services:
  web:
    build: .
    env_file:
      - .env.prod
    volumes:
      - ./db_extracted.sqlite3:/app/db_extracted.sqlite3
      - ./logs:/app/logs
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
